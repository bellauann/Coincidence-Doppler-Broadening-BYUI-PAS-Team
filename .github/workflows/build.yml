name: Build evt2bin Binries

on:
  push:
    tags:
      - 'v*'  # Triggers when you push tags like v1.0.0

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            binary-name: evt2bin
          - os: macos-latest
            name: macos-x64
            binary-name: evt2bin
          - os: windows-latest
            name: windows-x64
            binary-name: evt2bin.exe

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y g++ zlib1g-dev make

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zlib make

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        working-directory: txt-to-binary
        run: make clean && make static

      - name: Create Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: txt-to-binary/bin/${{ matrix.binary-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
