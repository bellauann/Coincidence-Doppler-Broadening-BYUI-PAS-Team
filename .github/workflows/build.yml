name: Build evt2bin Binaries

on:
  push:
    tags:
      - 'v*'  # Triggers when you push tags like v1.0.0

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write  # Required for creating release assets
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary-name: evt2bin
            release-name: evt2bin-linux-x64

          - os: macos-15-intel     # Intel (x86_64)
            binary-name: evt2bin
            release-name: evt2bin-macos-x64

          - os: macos-14           # Apple Silicon (arm64)
            binary-name: evt2bin
            release-name: evt2bin-macos-arm64

          - os: windows-latest
            binary-name: evt2bin.exe
            release-name: evt2bin-windows-x64.exe

    steps:
      - uses: actions/checkout@v4.1.1

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y g++ zlib1g-dev make

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install zlib

      # Windows: choco gives us g++ but not make.
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw make --yes
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\ProgramData\chocolatey\lib\make\tools\install\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        working-directory: txt-to-binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            make clean && make CXX=/usr/bin/clang++
          elif [ "$RUNNER_OS" == "Windows" ]; then
            make clean && make static
          else
            make clean && make static
          fi

      # The GitHub Actions macOS runner has Homebrew LLVM installed, which causes
      # the binary to reference /usr/local/opt/llvm@18/lib/libunwind.1.dylib —
      # a path that won't exist on user machines. Rewrite it to the system path
      # that ships on every Mac.
      - name: Fix libunwind path (macOS)
        if: runner.os == 'macOS'
        working-directory: txt-to-binary
        run: |
          install_name_tool -change \
            /usr/local/opt/llvm@18/lib/libunwind.1.dylib \
            /usr/lib/libunwind.1.dylib \
            bin/evt2bin

      # Rename the binary to its platform-specific release name
      - name: Rename binary
        shell: bash
        run: mv txt-to-binary/bin/${{ matrix.binary-name }} txt-to-binary/bin/${{ matrix.release-name }}

      - name: Create Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: txt-to-binary/bin/${{ matrix.release-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}