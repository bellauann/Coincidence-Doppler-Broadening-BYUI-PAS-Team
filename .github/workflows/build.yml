name: Build evt2bin Binaries

on:
  push:
    tags:
      - 'v*'  # Triggers when you push tags like v1.0.0

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write  # Required for creating release assets
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary-name: evt2bin
            release-name: evt2bin-linux-x64

          - os: macos-15-intel     # Intel (x86_64)
            binary-name: evt2bin
            release-name: evt2bin-macos-x64

          - os: macos-14           # Apple Silicon (arm64)
            binary-name: evt2bin
            release-name: evt2bin-macos-arm64

          - os: windows-latest
            binary-name: evt2bin.exe
            release-name: evt2bin-windows-x64.exe

    steps:
      - uses: actions/checkout@v4.1.1

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y g++ zlib1g-dev make

      # macOS: The system libz.tbd re-exports LLVM's libunwind, which won't
      # exist on user machines. Fix: build a clean static zlib from source
      # using only Apple clang, then point the Makefile at that instead.
      - name: Build static zlib from source (macOS)
        if: runner.os == 'macOS'
        working-directory: txt-to-binary
        run: |
          curl -LO https://zlib.net/zlib-1.3.1.tar.gz
          tar xf zlib-1.3.1.tar.gz
          cd zlib-1.3.1
          CC=/usr/bin/clang ./configure --static
          make CC=/usr/bin/clang
          cd ..
          sed -i '' "s|/usr/lib/libz.a|$(pwd)/zlib-1.3.1/libz.a|g" Makefile

      # Windows: choco gives us g++ but not make.
      # We install make via choco and use shell: bash for && syntax.
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw make --yes
          echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\ProgramData\chocolatey\lib\make\tools\install\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # On macOS, pass CXX directly on the make command line — this is the
      # highest-priority override in Make and beats the Makefile's own CXX :=
      # assignment. Forces Apple clang instead of Homebrew LLVM's g++.
      - name: Build
        working-directory: txt-to-binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            make clean && make static CXX=/usr/bin/clang++
          else
            make clean && make static
          fi

      # Rename the binary to its platform-specific release name
      - name: Rename binary
        shell: bash
        run: mv txt-to-binary/bin/${{ matrix.binary-name }} txt-to-binary/bin/${{ matrix.release-name }}

      - name: Create Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: txt-to-binary/bin/${{ matrix.release-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}